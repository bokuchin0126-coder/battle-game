<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>メモ帳</title>
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
</head>
<body>
    <P><span id="player">プレイヤー</span></P>
    <div id="gameOverText"></div>
    <div class="hp-box">

        <div id="playerDamageLayer"></div>

        <div class="hp-bar-bg">
            <div id="playerHpBar" class="hp-bar"></div>
            <span id="playerHpText"></span>
        </div>
    </div>
    <P>経験値<span id="experience">0</span></P>
    <p>レベル<span id="level">0</span></p>
    <button id="attack">攻撃！</button>
    <p><button id="specialMoves">必殺技</button>  <span id="specialText">クールタイム<span id="needTurn">0</span>ターン</span></p>
    <button id="item">アイテム</button>
    <p id="Portion">Portion</p>
    <p><span id="defeat">0</span>対撃破</p>
    <p >敵 : <span id="enemy"></span></p>
    <img id="enemyImage" width="120">
    <div id="enemyBox" class="hp-box">
         
        <div id="enemyDamageLayer"></div>

        <div class="hp-bar-bg">
            <div id="enemyHpBar" class="hp-bar"></div>
            <span id="enemyHpText"></span>
        </div>
    </div>
    <div id="log"></div>
</body>
</html>
